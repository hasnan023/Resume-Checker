name: Frontend CI/CD

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          cd resume-reader
          npm install

      - name: Build App
        run: |
          cd resume-reader
          npm run build

      - name: Build Docker Image
        run: |
          cd resume-reader
          docker build -t resume-frontend .

      - name: Run Container Test
        run: |
          cd resume-reader
          docker run -d -p 3000:3000 resume-frontend
          sleep 15
          curl -f http://localhost:3000 || exit 1